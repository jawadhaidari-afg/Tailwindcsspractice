<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwindcss Form States</title>
    <link rel="stylesheet" href="output.css">
</head>

<body class="p-6">
    <form class="space-y-4">
        <!-- Displaced Input -->
        <label class="block">
            <span class="block text-sm font-medium text-gray-700">Phone Number</span>
            <input type="text" value="123-456-789" disabled class="mt-1 block w-full px-3 py-2 bg-gray-200 border border-gray-400 rounded-md text-sm placeholder-gray-500 disabled:bg-gray-100 disabled:text-gray-500 disabled:border-gray-300 placeholder=Phone Number">
        </label>
        <!-- Required Input -->
        <label class="block">
            <span class="block text-sm font-medium text-gray-700">Address</span>
            <input type="text" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm placeholder-gray-400 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 required::border-red-500 required:text-red-600" placeholder="Enter your address">
        </label>
        <!-- Invalid Input -->
        <label class="block">
            <span class="block text-sm font-mediumtext-gray-700">Zip Code</span>
            <input type="text" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm placeholder-gray-400 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 invalid:borfer-orange-500 invalid:text-orange-600" placeholder="Enter your zip code" pattern="\d{5}">
        </label>
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-md shadow-sm hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            Submit
        </button>
    </form>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Login Page</title>
    <link rel="stylesheet" href="\output.css">
</head>
<body class="bg-purple-300 p-12">
    <div class="grid grid-cols-2 rounded-2xl ">
        <!-- Welcome Column -->
        <div class="bg-purple-600 p-30 rounded-l-2xl">
            <h2 class="text-4xl text-white text-semibold">Welcome Back!</h2>
            <p class="text-white">You can sign in to access with your existing account.</p>
        </div>
        <!-- Sign In Column -->
            <div class="pt-12 pb-12 pl-10 pr-10 bg-white rounded-r-2xl">
                <h1 class="text-3xl p-3 mb-2">Sign In</h1>
                <input type="text" placeholder="Username or email" class="border rounded-3xl w-80 h-10 ml-1 pl-4">

                <input type="password" placeholder="Password" class="border rounded-3xl w-80 h-10 ml-1 pl-4 mb-2 mt-3"><br>
                <span><input type="checkbox" class="mr-2 mt-2 ml-2 size-4">Remember me</span>
                <a href="#" class="ml-12">Forgot password?</a>
                <br>
                <button class="w-80 h-10 border rounded-3xl bg-purple-700 text-white text-xl mb-2 mt-4">Sign In</button>
                <p class="ml-10">New here?
                <a href="#" class="text-purple-600">Create an Account</a></p>
            
            </div>
    </div>

    <!-- rounded section on both columns -->
</body>
</html>

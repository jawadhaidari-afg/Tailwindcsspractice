<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Hover, Focus, Active</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="p-4">
        <h2 class="text-xl font-bold mb-4">Tailwind Css Hover, Focus and Active States</h2>
        <input type="text" placeholder="Interact with me!" 
        class="border p-3 w-100 h-8 rounded-md
         hover:border-blue-800
        focus:outline-none focus:ring focus:ring-teal-700
       active:border-teal-900
        ">
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Css First, Last, Odd, and pointer-events-none</title>
    <style>
        body{
            padding: 1rem;
            font-family: sans-serif;
            background-color: rgb(255, 255, 255);
        }
        #main{
            
            /* border: 1px solid black; */
            padding: 1rem;
            font-family: sans-serif;
            border-radius: 0.5rem;
        }
        .cardTop{
            border: 1px solid #ffffff;
            border-radius: 0.5rem;
            padding-left: 1rem;
            background-color: aliceblue;
            margin-bottom: 1rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .cardMiddle{
            border: 1px solid #ffffff;
            border-radius: 0.5rem;
            padding-left: 1rem;
            background-color: aliceblue; 
            margin-bottom: 1rem;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        }
        .cardBottom{
            border: 1px solid #ffffff;
            border-radius: 0.5rem;
            padding-left: 1rem;
            background-color: aliceblue;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        /* .cardTop:first-child{
            margin-top: 0px;
        }
        .cardBottom:last-child{
            margin-bottom: 0px;
        } */
    </style>
</head>
<body>
    <div id="main">
        <div class="cardTop" >
            <h3>Card 1</h3>
            <p>It has no top margin due to first:mt-0.</p>
        </div>

        <div class="cardMiddle">
            <h3>Card 2</h3>
            <p>It has standard top and bottom margins.</p>
        </div>

        <div class="cardBottom">
            <h3>Card 3</h3>
            <p>It has no bottom margin due to last:mb-0.</p>
        </div>
    </div>
</body>
</html>

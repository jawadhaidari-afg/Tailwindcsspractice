<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customcss vs Tailwindcss</title>
    <link rel="stylesheet" href="output.css">
</head>

<body class="flex justify-center items-center h-screen bg-gray-100">
    <div>
        <div>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
            <ul class="list-disc list-inside text-left text-gray-600">
                <li><strong class="text-green-500">Completed:</strong> Finished steps</li>
                <li><strong class="text-yellow-500">Current:</strong> The active steps</li>
                <li><strong class="text-gray-400">Upcoming</strong> Future steps</li>
            </ul>
        </div>
        <div class="relative flex items-center">
            <div class="'absolute inset-0 flex items-center pointer-events-none">
                <div class="flex-1 h-1 bg-green-500"></div>
                <div class="flex-1 h-1 bg-yellow-400"></div>
                <div class="flex-1 h-1 bg-gray-300"></div>
                <div class="flex-1 h-1 bg-gray-300"></div>
            </div>
            <!-- Step -->
            <div class="flex-1 text-center relative z-10">
                <div
                    class="w-12 h-12 rounded-full bg-green-500 text-white flex items-center justify-center max-auto mb-2 text-2xl">
                </div>
                <div class="text-sm">Step 1</div>
            </div>

            <div class="flex-1 text-center relative z-10">
                <div
                    class="w-12 h-12 rounded-full bg-yellow-500 text-white flex items-center justify-center mx-auto mb-2 text-2xl">
                </div>
                <div class="text-sm">Step 2</div>
            </div>

            <div class="flex-1 text-center relative z-10">
                <div
                    class="w-12 h-12 rounded-full bg-gray-200 text-white flex items-center justify-center mx-auto mb-2 text-2xl">
                </div>
                <div class="text-sm">Step 3</div>
            </div>

            <div class="flex-1 text-center relative z-10">
                <div
                    class="w-12 h-12 rounded-full bg-gray-200 text-white flex items-center justify-center mx-auto mb-3 text-2xl">
                </div>
                <div class="text-sm">Step 4</div>
                <div class="absolute right-0 top-1/2 2-1/4 h-px bg-gray-300">
                </div>
            </div>
        </div>

</body>

</html>

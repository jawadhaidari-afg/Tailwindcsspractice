<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Css Columns</title>
</head>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        .title{
            font-size: 1.875rem;
            font-weight: 700;
        }
        .aspect-auto{
            aspect-ratio: auto;
        }
        .aspect-square{
            aspect-ratio: 1/1;
        }
        .aspect-video{
            aspect-ratio: 16/9;
        }
        .aspect-auto img, .aspect-square img, .aspect-video img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
<body>
    <p>Tailwind CSS Aspect Ratio Class
    <p>
    <p class="title">Aspect Auto</p>
    <div class="aspect-ratio">
        <img src="IMG_3406.jpeg" alt="Nature">
    </div>
    <p>Aspect Square</p>
    <div class="aspect-square">
        <img src="IMG_0977.jpeg" alt="Waterfall">
    </div>
    <p>Aspect Video</p>
    <div class="aspect-video">
        <img src="IMG_3399.jpeg" alt="Volcano">
    </div>
</body>

</html>

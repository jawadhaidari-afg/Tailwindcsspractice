<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Css Odd and Even</title>
    <style>
        body{
            background-color: aliceblue;
            margin: 0;
            padding: 0;
        }
        
        ul{
            /* border: 1px transparent; */
            background-color: white;
            border-radius: 0.5rem;
            padding: 1.2rem;
            /* margin-left: 0.8rem; */
            list-style-type: none;
        }
        li{
            background-color: rgb(240, 229, 229);
            padding-left: 1.5rem;
            /* margin: 0.5rem; */
            border-radius: 0.1rem;
            border: 1px solid white;
        }
        h4{
            font-size: 1.3rem;
            font-weight: 900;
            font-family: Arial, Helvetica, sans-serif;
        }
        p{
            font-family: Arial, Helvetica, sans-serif;
            font-size: larger;
        }
        li:nth-child(odd){
            background-color: rgb(228, 234, 234);
        }
        li:nth-child(even){
            background-color: rgb(210, 216, 214);
        }
     
    </style>
</head>

<body>
        <ul>
            <li>
                <h4>Andriod</h4>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            </li>
            <li>
                <h4>Iphone</h4>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            </li>
            <li>
                <h4>Huawi</h4>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            </li>
            <li>
                <h4>Oppo</h4>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            </li>
        </ul>
</body>

</html>
